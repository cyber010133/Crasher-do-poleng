<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Polengo Crasher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#ddd;font-family:monospace;padding:30px;font-size:14px}
h1{color:#ff4444;margin-bottom:4px}
p{color:#444;font-size:12px;margin-bottom:24px}
#wrap{display:flex;gap:40px}
#left,#right{flex:1}
h3{color:#555;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#ddd;padding:8px 10px;font-family:monospace;font-size:13px;outline:none;border-radius:3px;margin-bottom:8px}
button{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#ddd;padding:8px;font-family:monospace;font-size:13px;cursor:pointer;border-radius:3px}
button:hover{background:#222}
#cbtn{background:#1a0000;border-color:#3a0000;color:#ff4444}
#cbtn:hover{background:#200000}
#stats{display:flex;gap:16px;margin-bottom:28px}
.s{background:#111;border:1px solid #1e1e1e;border-radius:3px;padding:12px 20px;text-align:center;flex:1}
.sn{font-size:24px;color:#ff4444}
.sl{font-size:10px;color:#444;margin-top:2px}
#bg{background:#1a1a1a;height:5px;border-radius:2px;overflow:hidden;margin:10px 0;display:none}
#bar{height:100%;width:0;background:#ff4444;transition:width .08s}
#log{font-size:12px;color:#444;line-height:2}
.ok{color:#44cc77}.e{color:#ff4444}.w{color:#ffaa00}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center}
#modal.show{display:flex}
#mbox{background:#111;border:1px solid #2a2a2a;border-radius:4px;padding:28px;width:340px;text-align:center}
#mbox h2{color:#ddd;margin-bottom:6px;font-size:16px}
#mbox p{color:#555;font-size:12px;margin-bottom:20px}
#mbox input{text-align:center;letter-spacing:6px;font-size:18px}
#mbox button{background:#1a2a1a;border-color:#2a4a2a;color:#44cc77}
#mbox button:hover{background:#1e331e}
#err{color:#ff4444;font-size:12px;height:16px;margin-bottom:10px}
</style>
</head>
<body>
<h1>Polengo Crasher</h1>
<p> O melhor que tem</p>

<div id="stats">
  <div class="s"><div class="sn" id="nc">0</div><div class="sl">derrubados</div></div>
  <div class="s"><div class="sn" id="np">0</div><div class="sl">players kickados</div></div>
  <div class="s"><div class="sn" id="ns">0</div><div class="sl">servidores offline</div></div>
</div>

<div id="right">
  <h3>Pesquisar Jogo</h3>
  <input id="si" placeholder="nome do jogo...">
  <button onclick="openModal()">🔍 Pesquisar</button>
</div>

<div id="modal">
  <div id="mbox">
    <h2>Verificação</h2>
    <p>Digite o código para continuar</p>
    <p id="code-display" style="font-size:22px;color:#fff;letter-spacing:6px;margin-bottom:16px;font-weight:bold"></p>
    <input id="code-input" placeholder="_ _ _ _ _ _" maxlength="6" autocomplete="off">
    <div id="err"></div>
    <button onclick="verify()">Confirmar</button>
  </div>
</div>

<script>
let code='';
function openModal(){
  if(!document.getElementById('si').value.trim())return;
  code=Math.floor(100000+Math.random()*900000).toString();
  document.getElementById('code-display').textContent=code;
  document.getElementById('code-input').value='';
  document.getElementById('err').textContent='';
  document.getElementById('modal').classList.add('show');
}
function verify(){
  if(document.getElementById('code-input').value===code){
    document.getElementById('modal').classList.remove('show');
    window.open('https://discord.com/app','_blank');
  }else{
    document.getElementById('err').textContent='código incorreto, tente novamente';
  }
}
document.getElementById('code-input').addEventListener('keydown',e=>{if(e.key==='Enter')verify();});
</script>
</body>
</html>
